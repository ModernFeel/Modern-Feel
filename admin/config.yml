backend:
  name: git-gateway
  branch: main # உங்கள் GitHub branch பெயர்

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Products & Offers"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "SKU / Item Code", name: "sku", widget: "string", required: false }
      - { label: "Normal Price (Original Price)", name: "price", widget: "number", value_type: "int" }
      - { label: "Offer Price (Discounted Price)", name: "offer_price", widget: "number", value_type: "int", required: false }
      - { label: "Product Image", name: "image", widget: "image" }
      
      # Category தேர்வு செய்வதற்கான Select Widget
      - label: "Category"
        name: "category"
        widget: "select"
        default: "Toys & Games"
        options:
          - "Toys & Games"
          - "Fashion & Dresses"
          - "Household Essentials"
          - "Electronics"
          - "Health & Beauty"
          - "Kitchenware"
          - "Special Offers"

      - { label: "Description", name: "body", widget: "markdown", required: false }
  # -----------------------------------------------------------
  # Banner & Video Management Collection
  # -----------------------------------------------------------
  - name: "banners"
    label: "Banner & Videos"
    folder: "content/banners"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Banner Title", name: "title", widget: "string" }
      - { label: "Subtitle / Tagline", name: "subtitle", widget: "string", required: false }
      - label: "Banner Type"
        name: "type"
        widget: "select"
        options:
          - "video_file"
          - "youtube"
          - "image"
      - { label: "Video File Upload (.mp4)", name: "video_file", widget: "file", required: false }
      - { label: "YouTube Embed URL or ID", name: "youtube_id", widget: "string", required: false }
      - { label: "Banner Image", name: "image", widget: "image", required: false }
